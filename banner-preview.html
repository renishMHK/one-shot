<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>OneShot Banner</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #09090B;
    width: 3200px;
    height: 480px;
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 56px;
  }

  /* Radial glows */
  .glow-center {
    position: absolute;
    width: 1200px;
    height: 440px;
    background: radial-gradient(ellipse, rgba(173,198,255,0.06) 0%, transparent 70%);
    pointer-events: none;
  }
  .glow-left {
    position: absolute; left: 12%; width: 600px; height: 320px;
    background: radial-gradient(ellipse, rgba(78,222,163,0.035) 0%, transparent 70%);
  }
  .glow-right {
    position: absolute; right: 12%; width: 600px; height: 320px;
    background: radial-gradient(ellipse, rgba(255,185,95,0.035) 0%, transparent 70%);
  }

  /* Grid overlay */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(173,198,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(173,198,255,0.02) 1px, transparent 1px);
    background-size: 160px 160px;
    pointer-events: none;
  }

  /* ── TARGET ── */
  .target-container {
    position: relative;
    width: 200px;
    height: 200px;
    z-index: 2;
    flex-shrink: 0;
  }

  .target-ring {
    position: absolute;
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }
  .ring-outer {
    width: 200px; height: 200px;
    border: 4px solid rgba(173,198,255,0.25);
    box-shadow: 0 0 20px rgba(173,198,255,0.08);
  }
  .ring-mid {
    width: 140px; height: 140px;
    border: 3px solid rgba(78,222,163,0.3);
    box-shadow: 0 0 16px rgba(78,222,163,0.06);
  }
  .ring-inner {
    width: 80px; height: 80px;
    border: 3px solid rgba(255,185,95,0.35);
    box-shadow: 0 0 12px rgba(255,185,95,0.08);
  }
  .ring-bullseye {
    width: 24px; height: 24px;
    background: radial-gradient(circle, #adc6ff 40%, rgba(173,198,255,0.3) 100%);
    box-shadow: 0 0 16px rgba(173,198,255,0.5);
  }

  /* Ring pulse after impact */
  @keyframes ring-pulse {
    0%   { opacity: 1; }
    50%  { opacity: 0.5; }
    100% { opacity: 1; }
  }
  .ring-outer { animation: ring-pulse 3s ease-in-out infinite; }
  .ring-mid   { animation: ring-pulse 3s ease-in-out infinite 0.3s; }
  .ring-inner { animation: ring-pulse 3s ease-in-out infinite 0.6s; }

  /* Crosshair lines */
  .crosshair {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }
  .crosshair-h, .crosshair-v {
    position: absolute;
    background: rgba(173,198,255,0.1);
  }
  .crosshair-h {
    width: 220px; height: 1px;
    top: 0; left: -110px;
  }
  .crosshair-v {
    width: 1px; height: 220px;
    top: -110px; left: 0;
  }

  /* ── DART ── */
  .dart-wrapper {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }

  @keyframes dart-strike {
    0%   { transform: translate(160px, -160px) rotate(-45deg) scale(1.2); opacity: 0; }
    15%  { opacity: 1; }
    40%  { transform: translate(0, 0) rotate(-45deg) scale(1); opacity: 1; }
    45%  { transform: translate(0, 0) rotate(-45deg) scale(1); opacity: 1; }
    100% { transform: translate(0, 0) rotate(-45deg) scale(1); opacity: 1; }
  }

  .dart {
    animation: dart-strike 4s ease-out infinite;
    transform-origin: center center;
  }

  /* Impact flash */
  .impact-flash {
    position: absolute;
    top: 50%; left: 50%;
    width: 60px; height: 60px;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(173,198,255,0.6) 0%, transparent 70%);
    opacity: 0;
    animation: impact-burst 4s ease-out infinite;
  }
  @keyframes impact-burst {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
    38%  { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
    42%  { opacity: 1; transform: translate(-50%, -50%) scale(1.8); }
    60%  { opacity: 0; transform: translate(-50%, -50%) scale(2.5); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(2.5); }
  }

  /* Bullseye glow on impact */
  @keyframes bullseye-glow {
    0%   { box-shadow: 0 0 16px rgba(173,198,255,0.5); }
    38%  { box-shadow: 0 0 16px rgba(173,198,255,0.5); }
    42%  { box-shadow: 0 0 40px rgba(78,222,163,0.9), 0 0 80px rgba(173,198,255,0.4); }
    60%  { box-shadow: 0 0 16px rgba(173,198,255,0.5); }
    100% { box-shadow: 0 0 16px rgba(173,198,255,0.5); }
  }
  .ring-bullseye { animation: bullseye-glow 4s ease-out infinite; }

  /* ── TEXT ── */
  @keyframes text-shimmer {
    0%   { background-position: -200% center; }
    100% { background-position: 200% center; }
  }

  .title-block {
    z-index: 2;
    display: flex;
    flex-direction: column;
  }

  .title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 128px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1;
    background: linear-gradient(
      90deg,
      #ffffff 0%, #ffffff 30%,
      #adc6ff 45%, #4edea3 50%, #adc6ff 55%,
      #ffffff 70%, #ffffff 100%
    );
    background-size: 200% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: text-shimmer 4s ease-in-out infinite;
  }

  .subtitle {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 22px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: #4edea3;
    margin-top: 16px;
  }

  /* Accent lines */
  .h-line {
    position: absolute; top: 50%; height: 2px; opacity: 0.1;
  }
  .h-line-left {
    right: calc(50% + 380px); left: 8%;
    background: linear-gradient(90deg, transparent, rgba(78,222,163,0.6), rgba(173,198,255,0.4));
  }
  .h-line-right {
    left: calc(50% + 380px); right: 8%;
    background: linear-gradient(90deg, rgba(173,198,255,0.4), rgba(255,185,95,0.6), transparent);
  }

  .deco-dot {
    position: absolute; top: 50%;
    width: 8px; height: 8px;
    border-radius: 50%;
    transform: translateY(-50%);
  }
  @keyframes dot-glow {
    0%, 100% { opacity: 0.15; box-shadow: none; }
    50% { opacity: 0.7; box-shadow: 0 0 16px currentColor; }
  }
  .deco-dot { animation: dot-glow 3s ease-in-out infinite; }
</style>
</head>
<body>
  <div class="glow-center"></div>
  <div class="glow-left"></div>
  <div class="glow-right"></div>
  <div class="h-line h-line-left"></div>
  <div class="h-line h-line-right"></div>
  <div class="deco-dot" style="left:14%; color:#4edea3; animation-delay:0s;"></div>
  <div class="deco-dot" style="left:24%; color:#adc6ff; animation-delay:0.7s;"></div>
  <div class="deco-dot" style="left:34%; color:#adc6ff; animation-delay:1.4s;"></div>
  <div class="deco-dot" style="right:14%; color:#ffb95f; animation-delay:0.3s;"></div>
  <div class="deco-dot" style="right:24%; color:#ffb95f; animation-delay:1.0s;"></div>
  <div class="deco-dot" style="right:34%; color:#4edea3; animation-delay:1.7s;"></div>

  <!-- Target -->
  <div class="target-container">
    <div class="crosshair">
      <div class="crosshair-h"></div>
      <div class="crosshair-v"></div>
    </div>
    <div class="target-ring ring-outer"></div>
    <div class="target-ring ring-mid"></div>
    <div class="target-ring ring-inner"></div>
    <div class="target-ring ring-bullseye"></div>

    <!-- Impact flash -->
    <div class="impact-flash"></div>

    <!-- Dart SVG -->
    <div class="dart-wrapper">
      <svg class="dart" width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Dart shaft -->
        <line x1="60" y1="60" x2="110" y2="10" stroke="#adc6ff" stroke-width="4" stroke-linecap="round"/>
        <!-- Dart fins -->
        <path d="M95 10 L110 10 L110 25" stroke="#4edea3" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M100 5 L115 5 L115 20" stroke="rgba(78,222,163,0.4)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- Dart tip -->
        <circle cx="60" cy="60" r="4" fill="#ffb95f" filter="url(#tipGlow)"/>
        <defs>
          <filter id="tipGlow" x="50" y="50" width="20" height="20">
            <feGaussianBlur stdDeviation="2" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
      </svg>
    </div>
  </div>

  <!-- Title + subtitle -->
  <div class="title-block">
    <div class="title">OneShot</div>
    <div class="subtitle">Autonomous Feature Delivery Pipeline</div>
  </div>
</body>
</html>
