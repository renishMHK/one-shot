<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>OneShot Banner</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #09090B;
    width: 3200px;
    height: 480px;
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Radial glows */
  .glow-center {
    position: absolute;
    width: 1200px; height: 440px;
    background: radial-gradient(ellipse, rgba(173,198,255,0.05) 0%, transparent 70%);
  }

  /* Grid overlay */
  body::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(173,198,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(173,198,255,0.015) 1px, transparent 1px);
    background-size: 160px 160px;
    pointer-events: none;
  }

  /* Layout container */
  .layout {
    display: flex;
    align-items: center;
    gap: 60px;
    z-index: 2;
    position: relative;
  }

  /* ── BULLSEYE TARGET ── */
  .target {
    position: relative;
    width: 220px; height: 220px;
    flex-shrink: 0;
  }
  .target-ring {
    position: absolute;
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }
  .t-r1 { width: 220px; height: 220px; background: rgba(173,198,255,0.15); }
  .t-r2 { width: 180px; height: 180px; background: #09090B; }
  .t-r3 { width: 150px; height: 150px; background: rgba(78,222,163,0.18); }
  .t-r4 { width: 110px; height: 110px; background: #09090B; }
  .t-r5 { width: 80px; height: 80px; background: rgba(255,185,95,0.2); }
  .t-r6 { width: 40px; height: 40px; background: #09090B; }
  .t-center {
    width: 20px; height: 20px;
    background: #adc6ff;
    box-shadow: 0 0 20px rgba(173,198,255,0.6), 0 0 40px rgba(173,198,255,0.2);
  }

  /* Impact glow on bullseye */
  @keyframes impact-glow {
    0%, 35% { box-shadow: 0 0 20px rgba(173,198,255,0.6), 0 0 40px rgba(173,198,255,0.2); }
    45%     { box-shadow: 0 0 50px rgba(78,222,163,0.9), 0 0 100px rgba(173,198,255,0.5), 0 0 140px rgba(173,198,255,0.2); }
    65%     { box-shadow: 0 0 20px rgba(173,198,255,0.6), 0 0 40px rgba(173,198,255,0.2); }
    100%    { box-shadow: 0 0 20px rgba(173,198,255,0.6), 0 0 40px rgba(173,198,255,0.2); }
  }
  .t-center { animation: impact-glow 5s ease-out infinite; }

  /* Ring ripple on impact */
  @keyframes ring-ripple {
    0%, 35% { opacity: 1; }
    45%     { opacity: 0.5; }
    55%     { opacity: 1; }
    100%    { opacity: 1; }
  }
  .t-r1 { animation: ring-ripple 5s ease-out infinite; }
  .t-r3 { animation: ring-ripple 5s ease-out infinite 0.08s; }
  .t-r5 { animation: ring-ripple 5s ease-out infinite 0.16s; }

  /* Impact shockwave ring */
  .shockwave {
    position: absolute;
    top: 50%; left: 50%;
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 2px solid rgba(173,198,255,0.6);
    transform: translate(-50%, -50%);
    opacity: 0;
    animation: shockwave-expand 5s ease-out infinite;
  }
  @keyframes shockwave-expand {
    0%, 38% { width: 20px; height: 20px; opacity: 0; }
    40%     { width: 20px; height: 20px; opacity: 0.8; }
    70%     { width: 260px; height: 260px; opacity: 0; }
    100%    { opacity: 0; }
  }

  /* ── ARROW ── */
  .arrow-track {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 3200px;
    height: 480px;
    pointer-events: none;
    z-index: 10;
  }

  @keyframes arrow-fly {
    0%   { transform: translateX(800px); opacity: 0; }
    10%  { opacity: 1; }
    40%  { transform: translateX(0px); opacity: 1; }
    100% { transform: translateX(0px); opacity: 1; }
  }

  .arrow-group {
    position: absolute;
    /* Position so arrowhead lands on bullseye center */
    top: 50%;
    left: calc(50% - 330px);
    transform: translateY(-50%);
    animation: arrow-fly 5s ease-out infinite;
  }

  .arrow-svg {
    display: block;
  }

  /* ── TEXT ── */
  @keyframes text-shimmer {
    0%   { background-position: -200% center; }
    100% { background-position: 200% center; }
  }

  .title-block {
    display: flex;
    flex-direction: column;
    z-index: 5;
  }

  .title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 128px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1;
    background: linear-gradient(
      90deg,
      #ffffff 0%, #ffffff 30%,
      #adc6ff 45%, #4edea3 50%, #adc6ff 55%,
      #ffffff 70%, #ffffff 100%
    );
    background-size: 200% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: text-shimmer 4s ease-in-out infinite;
  }

  .subtitle {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 22px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: #4edea3;
    margin-top: 16px;
  }

  /* Accent lines */
  .h-line {
    position: absolute; top: 50%; height: 2px; opacity: 0.08; z-index: 1;
  }
  .h-line-left {
    left: 5%; right: calc(50% + 420px);
    background: linear-gradient(90deg, transparent, rgba(78,222,163,0.5));
  }
  .h-line-right {
    left: calc(50% + 420px); right: 5%;
    background: linear-gradient(90deg, rgba(255,185,95,0.5), transparent);
  }

  .deco-dot {
    position: absolute; top: 50%;
    width: 8px; height: 8px;
    border-radius: 50%;
    transform: translateY(-50%);
    z-index: 1;
  }
  @keyframes dot-glow {
    0%, 100% { opacity: 0.15; box-shadow: none; }
    50% { opacity: 0.7; box-shadow: 0 0 16px currentColor; }
  }
  .deco-dot { animation: dot-glow 3s ease-in-out infinite; }
</style>
</head>
<body>
  <div class="glow-center"></div>
  <div class="h-line h-line-left"></div>
  <div class="h-line h-line-right"></div>
  <div class="deco-dot" style="left:6%; color:#4edea3; animation-delay:0s;"></div>
  <div class="deco-dot" style="left:14%; color:#adc6ff; animation-delay:0.7s;"></div>
  <div class="deco-dot" style="right:6%; color:#ffb95f; animation-delay:0.3s;"></div>
  <div class="deco-dot" style="right:14%; color:#4edea3; animation-delay:1.0s;"></div>

  <!-- Arrow flying from right to bullseye -->
  <div class="arrow-track">
    <div class="arrow-group">
      <svg class="arrow-svg" width="700" height="60" viewBox="0 0 700 60" fill="none">
        <!-- Arrow shaft -->
        <line x1="40" y1="30" x2="680" y2="30" stroke="url(#shaftGrad)" stroke-width="5" stroke-linecap="round"/>
        <!-- Arrowhead -->
        <polygon points="0,30 50,14 50,46" fill="#adc6ff" filter="url(#headGlow)"/>
        <!-- Fletching (feathers) at tail -->
        <path d="M670,30 L700,10 L690,30 L700,50 Z" fill="rgba(78,222,163,0.7)"/>
        <path d="M655,30 L680,15 L672,30 L680,45 Z" fill="rgba(78,222,163,0.4)"/>
        <!-- Trail glow -->
        <line x1="50" y1="30" x2="500" y2="30" stroke="url(#trailGrad)" stroke-width="2" opacity="0.5"/>
        <defs>
          <linearGradient id="shaftGrad" x1="0" y1="0" x2="700" y2="0">
            <stop offset="0%" stop-color="#adc6ff"/>
            <stop offset="50%" stop-color="#7aa3ff"/>
            <stop offset="100%" stop-color="#4edea3"/>
          </linearGradient>
          <linearGradient id="trailGrad" x1="50" y1="0" x2="500" y2="0">
            <stop offset="0%" stop-color="rgba(173,198,255,0.4)"/>
            <stop offset="100%" stop-color="rgba(173,198,255,0)"/>
          </linearGradient>
          <filter id="headGlow">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
      </svg>
    </div>
  </div>

  <div class="layout">
    <!-- Bullseye -->
    <div class="target">
      <div class="target-ring t-r1"></div>
      <div class="target-ring t-r2"></div>
      <div class="target-ring t-r3"></div>
      <div class="target-ring t-r4"></div>
      <div class="target-ring t-r5"></div>
      <div class="target-ring t-r6"></div>
      <div class="target-ring t-center"></div>
      <div class="shockwave"></div>
    </div>

    <!-- Title -->
    <div class="title-block">
      <div class="title">OneShot</div>
      <div class="subtitle">Autonomous Feature Delivery Pipeline</div>
    </div>
  </div>
</body>
</html>
